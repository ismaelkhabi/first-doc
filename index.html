<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Saytim</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <form id="arizaForm">
        <h3>Buyurtma berish</h3>
        <input type="text" id="ism" placeholder="Ismingiz" required>
        <input type="tel" id="tel" placeholder="Telefon raqamingiz" required>
        <input type="text" id="manzil" placeholder="Manzilingiz" required>
        <button type="submit">Yuborish</button>
    </form>

    <script>
        import express from 'express';
        
        const app = express();
        app.use(express.json()); // Essential to parse the JSON data from Telegram
        
        const TELEGRAM_TOKEN = 8912782310:AAG34WTo7B-8ojr93wjoL8MPsfn79cUozHE; // Replace with your BotFather token
        const PORT = process.env.PORT || 3000;
        
        // 1. Create the webhook endpoint
        app.post('/telegram-webhook', async (req, res) => {
            try {
                const { message } = req.body;
        
                // Verify that the incoming request contains a valid message
                if (message && message.chat && message.text) {
                    const chatId = message.chat.id;
                    const userText = message.text;
        
                    console.log(`Received message: "${userText}" from Chat ID: ${chatId}`);
        
                    // 2. Prepare a response based on user input
                    let replyText = `You said: ${userText}`;
                    if (userText.toLowerCase() === '/start') {
                        replyText = 'Welcome to our website bot!';
                    }
        
                    // 3. Send the response back to Telegram via its API
                    await fetch(`https://telegram.org{TELEGRAM_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: replyText
                        })
                    });
                }
        
                // Always return a 200 OK status to Telegram so it stops retrying the request
                res.status(200).send('OK');
            } catch (error) {
                console.error('Error processing webhook:', error);
                res.sendStatus(500);
            }
        });
        
        app.listen(PORT, () => {
            console.log(`Server running on port ${PORT}`);
        });

    </script>

</body>
</html>
